<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryCraft · Contadores de Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #e05c1a;
      --orange-bright: #f26b25;
      --orange-dim: #c04d14;
      --orange-glow: rgba(224, 92, 26, 0.18);
      --orange-glow-soft: rgba(224, 92, 26, 0.07);
      --bg: #0c0c0c;
      --surface: #161616;
      --surface-hover: #1d1d1d;
      --border: #232323;
      --border-focus: #3a2e28;
      --text-primary: #f0ece6;
      --text-secondary: #7a7570;
      --text-muted: #3d3a37;
      --error: #e05050;
      --success: #4caf82;
      --mono: 'DM Mono', 'Courier New', monospace;
      --helvetica: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--helvetica);
      overflow: hidden;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 600px 500px at 50% 0%, rgba(224,92,26,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 300px 300px at 80% 80%, rgba(224,92,26,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / eyebrow */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 3rem;
      animation: fadeUp 0.7s 0.05s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange-glow);
    }

    .eyebrow-text {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0.6;
    }

    /* Icon */
    .icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--orange-glow-soft);
      border: 1px solid rgba(224,92,26,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .icon-wrap svg {
      width: 24px;
      height: 24px;
      stroke: var(--orange);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Headline */
    .headline {
      font-family: var(--helvetica);
      font-size: 15.5px;
      font-weight: 400;
      color: #c8c2bc;
      text-align: center;
      line-height: 1.75;
      max-width: 320px;
      margin-bottom: 2.6rem;
    }

    .headline strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* Digit inputs */
    .digits {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .digit-input {
      width: 68px;
      height: 76px;
      background: #111111;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, color 0.2s;
      caret-color: var(--orange);
      -webkit-appearance: none;
      -moz-appearance: textfield;
      letter-spacing: 0;
    }

    .digit-input::-webkit-outer-spin-button,
    .digit-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .digit-input::placeholder {
      color: var(--text-muted);
      font-size: 18px;
    }

    .digit-input:focus {
      border-color: var(--orange);
      background: #141414;
      box-shadow: 0 0 0 4px var(--orange-glow), inset 0 0 0 1px rgba(224,92,26,0.1);
    }

    .digit-input.filled {
      border-color: #2e2520;
      color: var(--orange-bright);
    }

    .digit-input.error {
      border-color: var(--error) !important;
      box-shadow: 0 0 0 4px rgba(224,80,80,0.12) !important;
      animation: shake 0.38s ease both;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-7px); }
      30%       { transform: translateX(7px); }
      45%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
      75%       { transform: translateX(-3px); }
      90%       { transform: translateX(3px); }
    }

    /* Button */
    .btn {
      width: 100%;
      height: 54px;
      background: var(--orange);
      border: none;
      border-radius: 13px;
      font-family: var(--helvetica);
      font-size: 14.5px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      pointer-events: none;
    }

    .btn:hover:not(:disabled) {
      background: var(--orange-bright);
      box-shadow: 0 4px 20px rgba(224,92,26,0.35);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.97);
      background: var(--orange-dim);
    }

    .btn:disabled {
      background: #1f1f1f;
      color: #3d3a37;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Message */
    .msg {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      text-align: center;
      min-height: 18px;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .msg.visible { opacity: 1; }
    .msg.error   { color: var(--error); }
    .msg.success { color: var(--success); }

    /* Divider + footer */
    .footer {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .footer-line {
      width: 1px;
      height: 28px;
      background: linear-gradient(180deg, var(--border), transparent);
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.5rem 2rem; }
      .digit-input { width: 58px; height: 66px; font-size: 26px; }
      .digits { gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="eyebrow">
      <div class="eyebrow-dot"></div>
      <span class="eyebrow-text">Contadores de Stories · Mentoria</span>
    </div>

    <div class="card">

      <div class="icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M8 12h8M8 8h8M8 16h5"/>
        </svg>
      </div>

      <p class="headline">
        Preencha os campos abaixo com os <strong>4 últimos números</strong> do seu celular para ter acesso ao seu Storycraft personalizado.
      </p>

      <div class="digits" id="digits-container" role="group" aria-label="Código de acesso">
        <input class="digit-input" id="d0" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" placeholder="·" aria-label="Primeiro dígito" />
        <input class="digit-input" id="d1" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" placeholder="·" aria-label="Segundo dígito" />
        <input class="digit-input" id="d2" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" placeholder="·" aria-label="Terceiro dígito" />
        <input class="digit-input" id="d3" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" placeholder="·" aria-label="Quarto dígito" />
      </div>

      <button class="btn" id="confirm-btn" disabled aria-label="Acessar meu Storycraft">
        Acessar meu Storycraft
      </button>

      <p class="msg" id="msg" aria-live="polite" role="status"></p>

    </div>

    <div class="footer">
      <div class="footer-line"></div>
      <span class="footer-text">Acesso individual e intransferível</span>
    </div>

  </div>

  <script>
    const links = {
      '5255': 'https://chatgpt.com/g/g-6a56893d9e6c8191a16743e835a3cf7a-storycraft-pandora',
      '8929': 'https://chatgpt.com/g/g-6a56881aa17c81918fa713f0a942ee18-storycraft-mariana-werlich',
      '6037': 'https://chatgpt.com/g/g-6a56862ab670819195c34a87bdbaa1c4-storycraft-kamila-mota',
      '2201': 'https://chatgpt.com/g/g-6a568520b4588191b7f70727fc6ac77a-storycraft-hyuri-souza',
      '2185': 'https://chatgpt.com/g/g-6a5683c7db0c8191b297a677a52f9a75-storycraft-helena-fronza',
      '6030': 'https://chatgpt.com/g/g-6a568093d74c81919c5ebf5fc3a42c04-storycraft-giulia-goulart',
      '2446': 'https://chatgpt.com/g/g-6a567e7aea08819194065500e08ba7d0-storycraft-danielly-aguiar',
      '3363': 'https://chatgpt.com/g/g-6a56744001308191a4c2ae08923a877e-storycraft-amanda-costa'
    };

    const inputs = Array.from(document.querySelectorAll('.digit-input'));
    const btn    = document.getElementById('confirm-btn');
    const msg    = document.getElementById('msg');

    function getCode() {
      return inputs.map(i => i.value).join('');
    }

    function updateBtn() {
      btn.disabled = getCode().length < 4;
    }

    function setMsg(text, type) {
      msg.textContent = text;
      msg.className   = 'msg visible ' + type;
    }

    function clearMsg() {
      msg.textContent = '';
      msg.className   = 'msg';
    }

    function setError() {
      inputs.forEach(i => {
        i.classList.add('error');
        i.classList.remove('filled');
      });
      setMsg('Código não encontrado. Verifique os 4 últimos números do seu celular.', 'error');
      setTimeout(() => {
        inputs.forEach(i => {
          i.value = '';
          i.classList.remove('error', 'filled');
        });
        clearMsg();
        inputs[0].focus();
        updateBtn();
      }, 1000);
    }

    inputs.forEach((input, idx) => {

      input.addEventListener('input', () => {
        const val = input.value.replace(/[^0-9]/g, '');
        input.value = val.slice(-1);
        input.classList.toggle('filled', !!input.value);
        clearMsg();
        inputs.forEach(i => i.classList.remove('error'));
        if (input.value && idx < 3) inputs[idx + 1].focus();
        updateBtn();
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace') {
          if (!input.value && idx > 0) {
            inputs[idx - 1].value = '';
            inputs[idx - 1].classList.remove('filled');
            inputs[idx - 1].focus();
            updateBtn();
          }
        }
        if (e.key === 'Enter') btn.click();
        if (e.key === 'ArrowLeft'  && idx > 0) inputs[idx - 1].focus();
        if (e.key === 'ArrowRight' && idx < 3) inputs[idx + 1].focus();
      });

      input.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
        if (text.length >= 4) {
          inputs.forEach((inp, i) => {
            inp.value = text[i] || '';
            inp.classList.toggle('filled', !!inp.value);
          });
          inputs[3].focus();
          updateBtn();
        }
      });

      input.addEventListener('focus', () => input.select());
    });

    btn.addEventListener('click', () => {
      const code = getCode();
      if (code.length < 4) return;
      if (links[code]) {
        setMsg('Redirecionando…', 'success');
        btn.disabled = true;
        setTimeout(() => {
          window.open(links[code], '_blank');
          setMsg('Storycraft aberto em nova aba.', 'success');
          btn.disabled = false;
        }, 500);
      } else {
        setError();
      }
    });

    inputs[0].focus();
  </script>

</body>
</html>
